<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Bluebot — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{
  font-family:'Barlow',sans-serif;
  background:linear-gradient(135deg,#1e3a8a 0%,#2563eb 40%,#1e40af 70%,#0f172a 100%);
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;padding:16px;
  position:relative;
}

/* ── Animated background ───────────────── */
.bg-wrap{
  position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0;
}
.orb{
  position:absolute;border-radius:50%;filter:blur(80px);
  animation:orb-drift 12s ease-in-out infinite;
}
.orb-1{width:400px;height:400px;background:rgba(37,99,235,.35);
  top:-100px;left:-100px;animation-delay:0s;}
.orb-2{width:300px;height:300px;background:rgba(30,58,138,.4);
  bottom:-80px;right:-80px;animation-delay:-4s;}
.orb-3{width:250px;height:250px;background:rgba(37,99,235,.2);
  top:40%;left:60%;animation-delay:-8s;}
@keyframes orb-drift{
  0%,100%{transform:translate(0,0) scale(1);}
  33%{transform:translate(30px,-20px) scale(1.05);}
  66%{transform:translate(-20px,30px) scale(.95);}
}

/* Floating cylinders */
.floats{position:fixed;inset:0;pointer-events:none;z-index:0;}
.fc{
  position:absolute;
  animation:fc-float linear infinite;
  opacity:0;
}
@keyframes fc-float{
  0%  {transform:translateY(110vh) rotate(0deg);  opacity:0;}
  10% {opacity:.12;}
  90% {opacity:.08;}
  100%{transform:translateY(-15vh) rotate(20deg); opacity:0;}
}
.fc:nth-child(1) {left:7%;  width:28px;animation-duration:14s;animation-delay:0s;}
.fc:nth-child(2) {left:18%; width:18px;animation-duration:19s;animation-delay:-3s;}
.fc:nth-child(3) {left:32%; width:34px;animation-duration:12s;animation-delay:-7s;}
.fc:nth-child(4) {left:48%; width:22px;animation-duration:17s;animation-delay:-1s;}
.fc:nth-child(5) {left:62%; width:30px;animation-duration:15s;animation-delay:-9s;}
.fc:nth-child(6) {left:74%; width:16px;animation-duration:21s;animation-delay:-5s;}
.fc:nth-child(7) {left:86%; width:26px;animation-duration:13s;animation-delay:-11s;}
.fc:nth-child(8) {left:93%; width:20px;animation-duration:18s;animation-delay:-2s;}

/* Cylinder SVG shape */
.cyl-shape{
  display:block;
  fill:rgba(255,255,255,.6);
}

/* ── Login card ────────────────────────── */
.login-wrap{
  position:relative;z-index:1;
  width:100%;max-width:360px;
}
.login-card{
  background:rgba(255,255,255,.08);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  border:1px solid rgba(255,255,255,.15);
  border-radius:20px;
  padding:40px 32px 36px;
  box-shadow:
    0 32px 80px rgba(0,0,0,.4),
    0 0 0 1px rgba(255,255,255,.06),
    inset 0 1px 0 rgba(255,255,255,.1);
  animation:card-in .55s cubic-bezier(.34,1.45,.64,1) both;
}
@keyframes card-in{
  from{opacity:0;transform:translateY(40px) scale(.94);}
  to  {opacity:1;transform:translateY(0)    scale(1);}
}

/* Logo mark */
.logo-mark{
  width:64px;height:64px;border-radius:18px;
  background:linear-gradient(145deg,#3b82f6,#1d4ed8);
  display:flex;align-items:center;justify-content:center;
  font-size:1.8rem;color:#fff;margin:0 auto 20px;
  box-shadow:0 8px 28px rgba(37,99,235,.55);
  animation:logo-pop .6s .2s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes logo-pop{
  from{opacity:0;transform:scale(.5);}
  to  {opacity:1;transform:scale(1);}
}

.app-name{
  font-family:'Barlow Condensed',sans-serif;
  font-size:2.4rem;font-weight:900;color:#fff;
  text-align:center;letter-spacing:1px;
  line-height:1;margin-bottom:6px;
  animation:fade-up .5s .3s both;
}
.app-sub{
  font-size:.72rem;color:rgba(255,255,255,.45);
  text-align:center;margin-bottom:34px;
  letter-spacing:.6px;text-transform:uppercase;
  animation:fade-up .5s .4s both;
}
@keyframes fade-up{
  from{opacity:0;transform:translateY(10px);}
  to  {opacity:1;transform:translateY(0);}
}

/* Google button */
.g-btn{
  display:flex;align-items:center;justify-content:center;gap:10px;
  background:#fff;border:none;border-radius:12px;
  padding:0 20px;height:52px;width:100%;
  font-size:.95rem;font-weight:700;font-family:'Barlow',sans-serif;
  color:#1f2937;cursor:pointer;
  box-shadow:0 4px 20px rgba(0,0,0,.25);
  transition:all .15s ease;
  -webkit-tap-highlight-color:transparent;
  animation:fade-up .5s .5s both;
  position:relative;overflow:hidden;
}
.g-btn::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(37,99,235,.06),transparent);
  transform:translateX(-100%);
  transition:transform .4s ease;
}
.g-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 28px rgba(0,0,0,.32);
  background:#f8fafc;
}
.g-btn:hover::after{transform:translateX(100%);}
.g-btn:active{transform:scale(.97);}
.g-btn svg{width:20px;height:20px;flex-shrink:0;}

/* Status messages */
.status-msg{
  min-height:22px;margin-top:14px;
  font-size:.75rem;font-weight:600;
  text-align:center;border-radius:8px;
  padding:0;transition:all .2s;
}
.status-msg.loading{
  color:rgba(255,255,255,.6);
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:10px;
}
.status-msg.error{
  color:#fca5a5;
  background:rgba(239,68,68,.12);
  padding:8px 12px;
}
.status-msg.hidden{display:none;}

/* Spinner */
.spin{
  width:16px;height:16px;
  border:2px solid rgba(255,255,255,.15);
  border-top-color:rgba(255,255,255,.7);
  border-radius:50%;
  animation:spin .6s linear infinite;
  flex-shrink:0;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* Footer note */
.login-footer{
  margin-top:20px;text-align:center;
  font-size:.68rem;color:rgba(255,255,255,.25);
  animation:fade-up .5s .7s both;
}
.login-footer b{color:rgba(255,255,255,.4);}
</style>
</head>
<body>

<!-- Orbs -->
<div class="bg-wrap">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<!-- Floating cylinders -->
<div class="floats">
  <svg class="fc" viewBox="0 0 40 80"><rect class="cyl-shape" x="8" y="10" width="24" height="55" rx="12"/><rect class="cyl-shape" x="14" y="4" width="12" height="10" rx="4"/><rect class="cyl-shape" x="6" y="62" width="28" height="6" rx="3"/></svg>
  <svg class="fc" viewBox="0 0 40 80"><rect class="cyl-shape" x="8" y="10" width="24" height="55" rx="12"/><rect class="cyl-shape" x="14" y="4" width="12" height="10" rx="4"/><rect class="cyl-shape" x="6" y="62" width="28" height="6" rx="3"/></svg>
  <svg class="fc" viewBox="0 0 40 80"><rect class="cyl-shape" x="8" y="10" width="24" height="55" rx="12"/><rect class="cyl-shape" x="14" y="4" width="12" height="10" rx="4"/><rect class="cyl-shape" x="6" y="62" width="28" height="6" rx="3"/></svg>
  <svg class="fc" viewBox="0 0 40 80"><rect class="cyl-shape" x="8" y="10" width="24" height="55" rx="12"/><rect class="cyl-shape" x="14" y="4" width="12" height="10" rx="4"/><rect class="cyl-shape" x="6" y="62" width="28" height="6" rx="3"/></svg>
  <svg class="fc" viewBox="0 0 40 80"><rect class="cyl-shape" x="8" y="10" width="24" height="55" rx="12"/><rect class="cyl-shape" x="14" y="4" width="12" height="10" rx="4"/><rect class="cyl-shape" x="6" y="62" width="28" height="6" rx="3"/></svg>
  <svg class="fc" viewBox="0 0 40 80"><rect class="cyl-shape" x="8" y="10" width="24" height="55" rx="12"/><rect class="cyl-shape" x="14" y="4" width="12" height="10" rx="4"/><rect class="cyl-shape" x="6" y="62" width="28" height="6" rx="3"/></svg>
  <svg class="fc" viewBox="0 0 40 80"><rect class="cyl-shape" x="8" y="10" width="24" height="55" rx="12"/><rect class="cyl-shape" x="14" y="4" width="12" height="10" rx="4"/><rect class="cyl-shape" x="6" y="62" width="28" height="6" rx="3"/></svg>
  <svg class="fc" viewBox="0 0 40 80"><rect class="cyl-shape" x="8" y="10" width="24" height="55" rx="12"/><rect class="cyl-shape" x="14" y="4" width="12" height="10" rx="4"/><rect class="cyl-shape" x="6" y="62" width="28" height="6" rx="3"/></svg>
</div>

<!-- Login card -->
<div class="login-wrap">
  <div class="login-card">

    <div class="logo-mark"><i class="bi bi-robot"></i></div>
    <div class="app-name">Bluebot</div>
    <div class="app-sub">Smart LPG Agency Management</div>

    <button class="g-btn" id="signInBtn" onclick="doSignIn()">
      <svg viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.5 0 6.3 1.2 8.4 3.1l6.2-6.2C34.8 3 29.8 1 24 1 14.8 1 7 6.5 3.5 14.2l7.2 5.6C12.5 13.3 17.8 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.8c-.6 3-2.3 5.5-4.9 7.2l7.6 5.9C43.5 37.5 46.5 31.5 46.5 24.5z"/>
        <path fill="#FBBC05" d="M10.7 28.2C10.2 26.8 10 25.4 10 24s.2-2.8.7-4.2l-7.2-5.6C1.2 17.2 0 20.5 0 24s1.2 6.8 3.5 9.8l7.2-5.6z"/>
        <path fill="#34A853" d="M24 47c5.8 0 10.7-1.9 14.3-5.1l-7.6-5.9c-1.9 1.3-4.3 2-6.7 2-6.2 0-11.5-3.8-13.3-9.8l-7.2 5.6C7 41.5 14.8 47 24 47z"/>
      </svg>
      Continue with Google
    </button>

    <div id="statusMsg" class="status-msg hidden"></div>
  </div>

  <div class="login-footer">
    Access restricted to authorised users only<br/>
    <b>Bluebot &copy; 2026</b>
  </div>
</div>

<!-- Firebase SDK -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.8.0/firebase-app-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.8.0/firebase-auth-compat.min.js"></script>
<script>
const ALLOWED_EMAIL = 'bhagabattudu1999@gmail.com';
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyBa--BTPVvLBq4wfCJoUKXTbIZwKKdN2zE",
  authDomain:        "gasagency-b0723.firebaseapp.com",
  projectId:         "gasagency-b0723",
  storageBucket:     "gasagency-b0723.firebasestorage.app",
  messagingSenderId: "179078142770",
  appId:             "1:179078142870:web:28e76003a3c2a6f18b9bb7"
};

const msg    = document.getElementById('statusMsg');
const btn    = document.getElementById('signInBtn');

function showMsg(text, type) {
  msg.className = 'status-msg ' + type;
  if (type === 'loading') {
    msg.innerHTML = '<div class="spin"></div>' + text;
  } else {
    msg.textContent = text;
  }
}
function hideMsg() { msg.className = 'status-msg hidden'; msg.textContent = ''; }

let auth = null;

window.addEventListener('load', function () {
  if (typeof firebase === 'undefined') {
    // Retry once after 2s
    setTimeout(() => {
      if (typeof firebase !== 'undefined') initFb();
      else showMsg('No internet. Check connection and reload.', 'error');
    }, 2000);
    return;
  }
  initFb();
});

function initFb() {
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    auth = firebase.auth();

    // If already logged in with correct email → go straight to dashboard
    auth.onAuthStateChanged(function (user) {
      if (user && user.email.toLowerCase() === ALLOWED_EMAIL.toLowerCase()) {
        localStorage.setItem('bluebotUser', JSON.stringify({
          uid:   user.uid,
          email: user.email,
          name:  user.displayName || user.email.split('@')[0],
          ts:    Date.now()
        }));
        window.location.replace('dashboard.html');
      }
    });
  } catch (e) {
    // Silent — errors only in console
    console.error('Firebase init:', e);
  }
}

async function doSignIn() {
  if (!auth) {
    showMsg('Firebase not ready. Check internet and reload.', 'error');
    return;
  }
  btn.disabled = true;
  hideMsg();
  showMsg('Signing in...', 'loading');

  try {
    const provider = new firebase.auth.GoogleAuthProvider();
    const result   = await auth.signInWithPopup(provider);
    const user     = result.user;

    if (user.email.toLowerCase() !== ALLOWED_EMAIL.toLowerCase()) {
      await auth.signOut();
      btn.disabled = false;
      showMsg('Access denied: ' + user.email + ' is not authorised.', 'error');
      return;
    }

    // Save session → redirect
    localStorage.setItem('bluebotUser', JSON.stringify({
      uid:   user.uid,
      email: user.email,
      name:  user.displayName || user.email.split('@')[0],
      ts:    Date.now()
    }));
    showMsg('Login successful! Redirecting...', 'loading');
    window.location.replace('dashboard.html');

  } catch (e) {
    btn.disabled = false;
    const m = e.code === 'auth/popup-closed-by-user'     ? 'Sign-in cancelled.'
            : e.code === 'auth/configuration-not-found'  ? 'Google Auth not enabled in Firebase Console. Enable it first.'
            : e.code === 'auth/unauthorized-domain'       ? 'Domain not authorised. Add it in Firebase Console → Auth → Authorized Domains.'
            : e.code === 'auth/network-request-failed'    ? 'Network error. Check internet connection.'
            : e.code === 'auth/operation-not-allowed'     ? 'Google Sign-In not enabled in Firebase Console.'
            : 'Login failed. Try again.';
    // Only show clean message — full error in console
    console.error('Sign-in error:', e);
    showMsg(m, 'error');
  }
}
</script>
</body>
</html>
